<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} · {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <link rel="stylesheet" href="{{ '/assets/session.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title | escape }} home">
      <span class="brand-mark" aria-hidden="true">SB</span>
      <span>
        <span class="brand-title">{{ site.title | escape }}</span>
        <span class="brand-subtitle">published agent work</span>
      </span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}">Sessions</a>
      <a href="https://github.com/janole/session-bandit">Session Bandit</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>Generated with Session Bandit.</span>
    <span>Review redaction reports before publishing.</span>
  </footer>
</body>
</html>
